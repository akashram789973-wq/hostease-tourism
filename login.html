<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | HostEase</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <section class="login-section">

        <div class="login-container">

            <div class="login-info">

                <h1>Welcome Back!</h1>

                <p>
                    Login to continue your travel journey
                    with HostEase Tourism.
                </p>

            </div>

            <div class="login-form-box">

                <h2>Login</h2>

                <form id="loginForm">

                    <input
                        type="email"
                        id="loginEmail"
                        placeholder="Enter Email"
                        required>

                    <input
                        type="password"
                        id="loginPassword"
                        placeholder="Enter Password"
                        required>

                    <button type="submit">
                        Login
                    </button>

                </form>

                <p class="signup-text">

                    Don't have an account?

                    <a href="signup.html">
                        Signup
                    </a>

                </p>

            </div>

        </div>

    </section>

    <script type="module" src="script.js"></script>

</body>

</html>
