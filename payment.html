<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Payment - HostEase</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <!-- PAYMENT SECTION -->

    <section class="payment-section">

        <div class="payment-box">

            <h1>Secure Payment</h1>

            <p>
                Complete your booking payment
            </p>

            <form id="paymentForm">

                <input type="text"
                       placeholder="Card Holder Name"
                       required>

                <input type="text"
                       placeholder="Card Number"
                       maxlength="16"
                       required>

                <div class="payment-row">

                    <input type="text"
                           placeholder="MM/YY"
                           required>

                    <input type="text"
                           placeholder="CVV"
                           maxlength="3"
                           required>

                </div>

                <button type="submit">

                    Pay Now

                </button>

            </form>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
