<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Signup | HostEase</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <section class="login-section">

        <div class="login-container">

            <div class="login-info">

                <h1>Create Account</h1>

                <p>
                    Signup and start exploring amazing
                    travel destinations with HostEase.
                </p>

            </div>

            <div class="login-form-box">

                <h2>Signup</h2>

                <form id="signupForm">

                    <input
                        type="text"
                        id="name"
                        placeholder="Enter Name"
                        required>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter Email"
                        required>

                    <input
                        type="password"
                        id="password"
                        placeholder="Create Password"
                        required>

                    <button type="submit">
                        Signup
                    </button>

                </form>

                <p class="signup-text">

                    Already have an account?

                    <a href="login.html">
                        Login
                    </a>

                </p>

            </div>

        </div>

    </section>

    <script type="module" src="script.js"></script>

</body>

</html>
