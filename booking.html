<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Book Your Tour | HostEase</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <div class="logo">
            HostEase
        </div>

        <nav>

            <a href="index.html">Home</a>

            <a href="#booking">Booking</a>

        </nav>

    </header>

    <!-- ================= BOOKING SECTION ================= -->

    <section id="booking" class="booking-section">

        <div class="booking-container">

            <!-- LEFT CONTENT -->

            <div class="booking-info">

                <h1>Book Your Dream Tour</h1>

                <p>
                    Explore beautiful destinations with affordable
                    packages and unforgettable experiences.
                </p>

                <ul>

                    <li>✔ Premium Travel Packages</li>

                    <li>✔ Affordable Pricing</li>

                    <li>✔ 24/7 Customer Support</li>

                    <li>✔ Safe & Comfortable Journey</li>

                </ul>

            </div>

            <!-- RIGHT FORM -->

            <div class="booking-form-box">

                <h2>Tour Booking</h2>

                <form id="bookingForm">

                    <input type="text"
                           placeholder="Enter Your Name"
                           required>

                    <input type="email"
                           placeholder="Enter Your Email"
                           required>

                    <input type="tel"
                           placeholder="Phone Number"
                           required>

                    <select required>

                        <option value="">
                            Select Package
                        </option>

                        <option>
                            Goa Trip
                        </option>

                        <option>
                            Manali Tour
                        </option>

                        <option>
                            Kerala Package
                        </option>

                    </select>

                    <input type="date"
                           required>

                    <button type="submit">
                        Confirm Booking
                    </button>

                </form>

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
